name: Python Quality Matrix

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        stage:
          - lint
          - type
          - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyright ruff pandas pydantic inflection openpyxl

      - name: Run matrix stage
        run: python scripts/run_quality_matrix.py --stage ${{ matrix.stage }}

